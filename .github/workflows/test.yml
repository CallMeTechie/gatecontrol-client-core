name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Auth for the private @callmetechie GitHub Packages registry (see .npmrc).
  # Repo secret GC_CLIENT_CORE = classic PAT with read:packages.
  NODE_AUTH_TOKEN: ${{ secrets.GC_CLIENT_CORE }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
